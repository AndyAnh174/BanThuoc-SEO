apiVersion: v1
kind: Secret
metadata:
  name: banthuoc-secrets
  namespace: banthuoc
type: Opaque
stringData:
  # ⚠️ REAL VALUES ARE APPLIED DIRECTLY ON K8S SERVER — NOT STORED IN GIT
  # To update: kubectl edit secret banthuoc-secrets -n banthuoc
  POSTGRES_DB: banthuoc_db
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: CHANGE_ME
  REDIS_PASSWORD: CHANGE_ME
  DJANGO_SECRET_KEY: CHANGE_ME
  MINIO_ROOT_USER: minioadmin
  MINIO_ROOT_PASSWORD: CHANGE_ME
  EMAIL_HOST_USER: CHANGE_ME
  EMAIL_HOST_PASSWORD: CHANGE_ME
  DEFAULT_FROM_EMAIL: CHANGE_ME
  VNPAY_TMN_CODE: CHANGE_ME
  VNPAY_HASH_SECRET: CHANGE_ME
  INTERNAL_SECRET: CHANGE_ME
  GHN_TOKEN: CHANGE_ME
