apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: banthuoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: andyanh174/banthuoc-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: banthuoc-config
                  key: NEXT_PUBLIC_API_URL
            - name: INTERNAL_API_URL
              valueFrom:
                configMapKeyRef:
                  name: banthuoc-config
                  key: INTERNAL_API_URL
            - name: NEXT_PUBLIC_SITE_URL
              valueFrom:
                configMapKeyRef:
                  name: banthuoc-config
                  key: NEXT_PUBLIC_SITE_URL
            - name: VNPAY_TMN_CODE
              valueFrom:
                secretKeyRef:
                  name: banthuoc-secrets
                  key: VNPAY_TMN_CODE
            - name: VNPAY_HASH_SECRET
              valueFrom:
                secretKeyRef:
                  name: banthuoc-secrets
                  key: VNPAY_HASH_SECRET
            - name: VNPAY_SANDBOX
              valueFrom:
                configMapKeyRef:
                  name: banthuoc-config
                  key: VNPAY_SANDBOX
            - name: VNPAY_HOST
              valueFrom:
                configMapKeyRef:
                  name: banthuoc-config
                  key: VNPAY_HOST
            - name: INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: banthuoc-secrets
                  key: INTERNAL_SECRET
            - name: NODE_ENV
              value: "production"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: banthuoc
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
