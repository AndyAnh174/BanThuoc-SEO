apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: banthuoc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:alpine
          command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)"]
          ports:
            - containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: banthuoc-secrets
                  key: REDIS_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: banthuoc
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
