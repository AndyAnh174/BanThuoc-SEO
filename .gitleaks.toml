# Gitleaks Configuration for BanThuoc-SEO
# Scans for leaked secrets, API keys, tokens before CI/CD deploy
# Docs: https://github.com/gitleaks/gitleaks

title = "BanThuoc Gitleaks Config"

# Extend default ruleset (all built-in rules still active)
[extend]
  useDefault = true

# Global allowlist — exceptions on top of default rules
[allowlist]
  description = "Known safe patterns"

  # Files to skip (glob patterns)
  paths = [
    '''Jenkinsfile''',
    '''CLAUDE.md''',
    '''server/core/settings/.env.example''',
    '''(?i)\.(?:jpg|gif|png|svg|ico|woff2?|ttf|eot)$'''
  ]

  # Regex patterns to ignore (common test/example placeholders)
  regexes = [
    '''(?i)(example|test|sample|demo|placeholder|changeme|replace)'''
  ]
